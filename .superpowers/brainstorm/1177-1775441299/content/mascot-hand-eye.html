<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #050505; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; color: #ff2d78; gap: 24px; }
  h2 { letter-spacing: 4px; font-size: 13px; opacity: 0.7; text-transform: uppercase; margin: 0; }
  p { font-size: 11px; opacity: 0.45; letter-spacing: 2px; margin: 0; }
  .scanlines { position: fixed; inset: 0; background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,45,120,0.015) 2px,rgba(255,45,120,0.015) 4px); pointer-events: none; z-index: 10; }
</style>
</head>
<body>
<div class="scanlines"></div>
<h2>// VOIDEX — mascot preview</h2>
<p>cursor-following eye · blink · emo drip</p>

<svg id="mascot" width="260" height="340" viewBox="0 0 260 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="grit" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="3" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="grit2" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.065" numOctaves="4" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="grain-overlay">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
    <clipPath id="handClip">
      <path d="M55 310 Q40 280 38 240 Q36 200 40 170 Q30 165 28 145 Q26 125 40 120 Q42 100 55 98 Q57 78 72 76 Q74 56 90 55 Q106 54 108 74 Q124 72 130 90 Q145 75 162 80 Q178 85 176 108 Q190 100 204 108 Q218 116 212 138 Q220 148 218 168 Q215 195 200 210 Q195 250 188 285 Q180 315 165 330 Q140 345 110 338 Q75 330 55 310Z"/>
    </clipPath>
  </defs>

  <!-- WRIST / BASE -->
  <path d="M68 310 Q55 295 52 270 L205 270 Q202 295 190 310 Q168 335 130 338 Q92 340 68 310Z" fill="#120008" stroke="#ff2d78" stroke-width="1.5" filter="url(#grit2)" opacity="0.9"/>

  <!-- PALM body -->
  <path d="M50 175 Q48 140 55 120 Q62 100 80 98 Q82 78 96 76 Q110 74 112 94 Q126 90 134 106 Q148 88 164 93 Q180 98 178 120 Q192 108 206 118 Q220 128 212 150 Q222 162 218 185 Q212 215 195 228 Q188 258 182 285 Q172 318 130 326 Q88 330 68 308 Q48 285 50 245 Q52 210 50 175Z" fill="#1a000d" stroke="#ff2d78" stroke-width="2" filter="url(#grit)"/>

  <!-- FINGER 1 - pinky -->
  <path d="M55 120 Q52 95 56 75 Q60 58 72 55 Q84 52 86 70 Q88 88 84 108" fill="#1a000d" stroke="#ff2d78" stroke-width="1.8" stroke-linecap="round" filter="url(#grit2)"/>

  <!-- FINGER 2 - ring -->
  <path d="M82 100 Q80 72 84 50 Q88 32 102 30 Q116 28 116 48 Q116 68 112 96" fill="#1a000d" stroke="#ff2d78" stroke-width="1.8" stroke-linecap="round" filter="url(#grit2)"/>

  <!-- FINGER 3 - middle -->
  <path d="M112 96 Q112 66 116 44 Q120 24 134 22 Q148 20 148 42 Q148 64 144 96" fill="#1a000d" stroke="#ff2d78" stroke-width="1.8" stroke-linecap="round" filter="url(#grit2)"/>

  <!-- FINGER 4 - index -->
  <path d="M142 100 Q144 72 148 52 Q152 34 166 36 Q180 38 178 60 Q176 82 172 110" fill="#1a000d" stroke="#ff2d78" stroke-width="1.8" stroke-linecap="round" filter="url(#grit2)"/>

  <!-- FINGER 5 - thumb -->
  <path d="M175 120 Q192 108 206 118 Q220 128 212 150 Q205 165 190 170" fill="#1a000d" stroke="#ff2d78" stroke-width="1.8" stroke-linecap="round" filter="url(#grit2)"/>

  <!-- Palm crease lines -->
  <path d="M62 200 Q100 190 175 205" stroke="#ff2d7830" stroke-width="1.5" fill="none" filter="url(#grit2)"/>
  <path d="M58 230 Q90 218 180 232" stroke="#ff2d7820" stroke-width="1" fill="none" filter="url(#grit2)"/>

  <!-- EYE SOCKET in palm -->
  <ellipse cx="122" cy="200" rx="44" ry="36" fill="#050505" stroke="#ff2d78" stroke-width="1.5" filter="url(#grit)" opacity="0.95"/>

  <!-- EYELID TOP (for blinking) -->
  <path id="eyelid-top" d="M78 200 Q100 175 122 172 Q144 175 166 200Z" fill="#1a000d" stroke="#ff2d78" stroke-width="1.5"/>

  <!-- EYELID BOTTOM -->
  <path d="M78 200 Q100 222 122 225 Q144 222 166 200Z" fill="#1a000d" stroke="#ff2d7866" stroke-width="1"/>

  <!-- IRIS -->
  <circle id="iris" cx="122" cy="200" r="22" fill="#ff2d78" filter="url(#glow)"/>

  <!-- PUPIL -->
  <circle id="pupil" cx="122" cy="200" r="11" fill="#050505"/>

  <!-- HIGHLIGHT -->
  <circle id="highlight" cx="128" cy="193" r="4" fill="white" opacity="0.7"/>

  <!-- EMO DRIP from eye -->
  <path d="M114 235 Q112 252 110 268 Q108 278 106 288" stroke="#ff2d78" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.85" filter="url(#grit2)"/>
  <circle cx="104" cy="294" r="4" fill="#ff2d78" opacity="0.7"/>

  <!-- Second small drip -->
  <path d="M130 234 Q129 244 128 252" stroke="#ff2d78" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Ink splatters -->
  <circle cx="70" cy="245" r="2.5" fill="#ff2d78" opacity="0.35"/>
  <circle cx="175" cy="238" r="2" fill="#ff2d78" opacity="0.25"/>
  <circle cx="85" cy="175" r="1.5" fill="#ff2d78" opacity="0.3"/>
  <circle cx="158" cy="168" r="1.5" fill="#ff2d78" opacity="0.3"/>

  <!-- EMO BROW (heavy, angled down inward) -->
  <path d="M88 168 Q105 158 122 164" stroke="#ff2d78" stroke-width="5" stroke-linecap="round" filter="url(#grit2)"/>

  <!-- Grain overlay on whole mascot -->
  <rect x="40" y="20" width="230" height="330" fill="url(#grain-overlay)" opacity="0.08" clip-path="url(#handClip)"/>
</svg>

<p style="opacity:0.3;font-size:10px;letter-spacing:3px;">// eye follows cursor in final build</p>

<script>
  const iris = document.getElementById('iris')
  const pupil = document.getElementById('pupil')
  const highlight = document.getElementById('highlight')
  const eyelidTop = document.getElementById('eyelid-top')

  const cx = 122, cy = 200, maxDist = 10

  document.addEventListener('mousemove', (e) => {
    const rect = document.getElementById('mascot').getBoundingClientRect()
    const ex = cx + rect.left + rect.width / 2 - rect.width / 2
    const ey = cy + rect.top + rect.height / 2 - rect.height / 2
    const mx = e.clientX - (rect.left + rect.width * (cx / 260))
    const my = e.clientY - (rect.top + rect.height * (cy / 340))
    const angle = Math.atan2(my, mx)
    const dist = Math.min(Math.sqrt(mx*mx + my*my), maxDist * 80) / 80 * maxDist
    const nx = cx + Math.cos(angle) * Math.min(dist, maxDist)
    const ny = cy + Math.sin(angle) * Math.min(dist, maxDist)
    iris.setAttribute('cx', nx)
    pupil.setAttribute('cx', nx)
    highlight.setAttribute('cx', nx + 6)
    highlight.setAttribute('cy', ny - 7)
  })

  // Blink randomly
  function blink() {
    eyelidTop.setAttribute('d', `M78 200 Q100 226 122 228 Q144 226 166 200Z`)
    setTimeout(() => {
      eyelidTop.setAttribute('d', `M78 200 Q100 175 122 172 Q144 175 166 200Z`)
    }, 120)
    setTimeout(blink, 2000 + Math.random() * 4000)
  }
  setTimeout(blink, 1500)
</script>
</body>
</html>
