<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer eye shape -->
  <path d="M4 24 C12 10, 36 10, 44 24 C36 38, 12 38, 4 24 Z" fill="rgba(255,45,120,0.08)" stroke="#ff2d78" stroke-width="2" filter="url(#glow)"/>
  <!-- Iris -->
  <circle cx="24" cy="24" r="8" fill="rgba(255,45,120,0.12)" stroke="#ff2d78" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Pupil -->
  <circle cx="24" cy="24" r="3.5" fill="#ff2d78" filter="url(#glow)"/>
  <!-- Highlight -->
  <circle cx="21" cy="21" r="1.2" fill="rgba(255,255,255,0.6)"/>
</svg>
